# This workflow will build a Java project with Maven, run tests,
# generate JaCoCo coverage reports and PIT mutation reports.

name: Java CI with Maven

on:
  push:
    branches:
      - milestone4-refactoring
  pull_request:
    branches:
      - milestone4-refactoring
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        run: >
          mvn -B clean install --file pom.xml
          -Dmaven.test.skip=true
          -DskipITs
          -Dcheckstyle.skip=true
          -Drat.skip=true

      # ------------------------------------------------------------
      # JaCoCo - storm-server
      # ------------------------------------------------------------
      - name: Run storm-server tests with JaCoCo
        run: >
          mvn -B -pl :storm-server
          org.jacoco:jacoco-maven-plugin:0.8.11:prepare-agent
          "-Dtest=*Test,!*_ESTest"
          test
          org.jacoco:jacoco-maven-plugin:0.8.11:report
          -Dcheckstyle.skip=true
          -Drat.skip=true
          -DskipITs

      # ------------------------------------------------------------
      # JaCoCo - storm-redis
      # ------------------------------------------------------------
      - name: Run storm-redis tests with JaCoCo
        run: >
          mvn -B -pl :storm-redis
          org.jacoco:jacoco-maven-plugin:0.8.11:prepare-agent
          "-Dtest=*Test,!*_ESTest"
          test
          org.jacoco:jacoco-maven-plugin:0.8.11:report
          -Dcheckstyle.skip=true
          -Drat.skip=true
          -DskipITs

      # ------------------------------------------------------------
      # PIT - storm-server (mirato a StatsUtil)
      # ------------------------------------------------------------
      - name: Run PIT on storm-server (StatsUtil)
        run: >
          mvn -B -pl :storm-server
          org.pitest:pitest-maven:mutationCoverage
          -DtargetClasses=org.apache.storm.stats.StatsUtil
          -DtargetTests=org.apache.storm.stats.*Test
          -DexcludedTestClasses=*_ESTest,*_ESTest_scaffolding
          -Dcheckstyle.skip=true
          -Drat.skip=true
          -DskipITs

      # ------------------------------------------------------------
      # PIT - storm-redis (mirato a RedisKeyValueStateIterator)
      # ------------------------------------------------------------
      - name: Run PIT on storm-redis (RedisKeyValueStateIterator)
        run: >
          mvn -B -pl :storm-redis
          org.pitest:pitest-maven:mutationCoverage
          -DtargetClasses=org.apache.storm.redis.state.RedisKeyValueStateIterator
          -DtargetTests=org.apache.storm.redis.state.*Test
          -DexcludedTestClasses=*_ESTest,*_ESTest_scaffolding
          -Dcheckstyle.skip=true
          -Drat.skip=true
          -DskipITs

      # ------------------------------------------------------------
      # Upload artifacts - JaCoCo
      # ------------------------------------------------------------
      - name: Upload JaCoCo report - storm-server
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-storm-server
          path: storm-server/target/site/jacoco

      - name: Upload JaCoCo report - storm-redis
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-storm-redis
          path: external/storm-redis/target/site/jacoco

      # ------------------------------------------------------------
      # Upload artifacts - PIT
      # ------------------------------------------------------------
      - name: Upload PIT report - storm-server
        uses: actions/upload-artifact@v4
        with:
          name: pit-storm-server
          path: storm-server/target/pit-reports

      - name: Upload PIT report - storm-redis
        uses: actions/upload-artifact@v4
        with:
          name: pit-storm-redis
          path: external/storm-redis/target/pit-reports
