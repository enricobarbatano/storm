name: Milestone 4 Java CI

on:
  push:
    branches:
      - main
      - milestone4-refactoring
  pull_request:
    branches:
      - main
      - milestone4-refactoring
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build selected modules and run Milestone 4 tests
        run: >
          mvn -B
          -pl external/storm-hdfs,external/storm-redis
          -am test
          -Dtest=HdfsSpoutCategoryPartitionTest,RedisKeyValueStateIteratorCategoryPartitionTest
          -DskipITs
          -Dcheckstyle.skip=true
          -Drat.skip=true
          -DfailIfNoTests=false
          -Dsurefire.failIfNoSpecifiedTests=false