name: Java CI with Maven

on:
  push:
    branches:
      - milestone4-refactoring
  pull_request:
    branches:
      - milestone4-refactoring
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        run: >
          mvn -B clean install --file pom.xml
          -Dmaven.test.skip=true
          -DskipITs
          -Dcheckstyle.skip=true
          -Drat.skip=true

      - name: Run storm-server tests with JaCoCo
        run: >
          mvn -B -pl :storm-server
          org.jacoco:jacoco-maven-plugin:0.8.11:prepare-agent
          "-Dtest=*Test,!*_ESTest"
          test
          org.jacoco:jacoco-maven-plugin:0.8.11:report
          -Dcheckstyle.skip=true
          -Drat.skip=true
          -DskipITs

      - name: Run storm-redis tests with JaCoCo
        run: >
          mvn -B -pl :storm-redis
          org.jacoco:jacoco-maven-plugin:0.8.11:prepare-agent
          "-Dtest=*Test,!*_ESTest"
          test
          org.jacoco:jacoco-maven-plugin:0.8.11:report
          -Dcheckstyle.skip=true
          -Drat.skip=true
          -DskipITs

      # Primo run PIT in dry-run per storm-server
      - name: Run PIT dry-run on storm-server
        continue-on-error: true
        run: >
          mvn -B -pl :storm-server
          test-compile
          org.pitest:pitest-maven:mutationCoverage
          -Dpit.dryRun=true
          -Dverbose=true
          -Dcheckstyle.skip=true
          -Drat.skip=true
          -DskipITs

      # PIT vero su storm-server
      - name: Run PIT on storm-server
        continue-on-error: true
        run: >
          mvn -B -pl :storm-server
          test-compile
          org.pitest:pitest-maven:mutationCoverage
          -Dcheckstyle.skip=true
          -Drat.skip=true
          -DskipITs

      # PIT vero su storm-redis
      - name: Run PIT on storm-redis
        continue-on-error: true
        run: >
          mvn -B -pl :storm-redis
          test-compile
          org.pitest:pitest-maven:mutationCoverage
          -Dcheckstyle.skip=true
          -Drat.skip=true
          -DskipITs

      - name: Upload JaCoCo report - storm-server
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-storm-server
          path: storm-server/target/site/jacoco

      - name: Upload JaCoCo report - storm-redis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-storm-redis
          path: external/storm-redis/target/site/jacoco

      - name: Upload PIT report - storm-server
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-storm-server
          path: storm-server/target/pit-reports

      - name: Upload PIT report - storm-redis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-storm-redis
          path: external/storm-redis/target/pit-reports